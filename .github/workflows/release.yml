name: Release binaries

on:
  push:
    tags: ['v*']
  # A manual run is always a rehearsal: it builds all three launchers, but the
  # release job is gated on a v* tag ref (see its `if:`), so workflow_dispatch
  # never publishes a Release. Only pushing a v* tag releases.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # appindicator tray needs the Ayatana/GI/GTK stack at build time so
      # PyInstaller can bundle it; desktop-file-utils is for appimagetool. The
      # build runs under /usr/bin/python3 (which has python3-gi) — see spec §6.1.
      - name: Install AppIndicator/GI build stack
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            desktop-file-utils \
            gir1.2-ayatanaappindicator3-0.1 libayatana-appindicator3-1 \
            libgirepository-1.0-1 gir1.2-glib-2.0 python3-gi libgtk-3-0 \
            python3-pip python3-venv
      - run: sudo python3 -m pip install --break-system-packages -r requirements.txt pyinstaller
      - run: PYTHON=/usr/bin/python3 bash packaging/build-linux.sh
      - uses: actions/upload-artifact@v7
        with:
          name: linux
          path: Contact-List-x86_64.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt pyinstaller
      - run: bash packaging/make-icons.sh
      - run: pyinstaller --noconfirm packaging/contact-list.spec
      - uses: actions/upload-artifact@v7
        with:
          name: windows
          path: dist/Contact-List.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt pyinstaller
      - run: bash packaging/build-macos.sh
      - uses: actions/upload-artifact@v7
        with:
          name: macos
          path: Contact-List.dmg

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            linux/Contact-List-x86_64.AppImage
            windows/Contact-List.exe
            macos/Contact-List.dmg
